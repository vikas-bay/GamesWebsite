<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tango - Puzzle Game</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">Back to Games</a>

        <div class="game-container">
            <div class="game-header">
                <h1>☀️ Tango 🌙</h1>
                <div class="game-buttons">
                    <button class="btn btn-primary" id="generateBtn">Generate New Puzzle</button>
                    <button class="btn btn-secondary" id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="game-info">
                <div class="info-row">
                    <span>Difficulty:</span>
                    <strong id="difficulty">Medium</strong>
                </div>
                <div class="info-row">
                    <span>Moves:</span>
                    <strong id="moves">0</strong>
                </div>
            </div>

            <div class="game-content">
                <div class="game-board">
                    <div class="grid grid-6x6" id="gameBoard"></div>
                </div>
            </div>

            <div style="text-align: center; color: #666; margin-top: 20px;">
                <p><strong>Rules:</strong> Each row and column must have 3 suns and 3 moons. No three consecutive suns or moons in any row or column.</p>
            </div>
        </div>
    </div>

    <script>
        class TangoGame {
            constructor() {
                this.size = 6;
                this.board = [];
                this.locked = [];
                this.initialPuzzle = [];
                this.solution = [];
                this.moves = 0;
                this.boardElement = document.getElementById('gameBoard');
                this.movesElement = document.getElementById('moves');
                this.generateBtn = document.getElementById('generateBtn');
                this.resetBtn = document.getElementById('resetBtn');

                this.generateBtn.addEventListener('click', () => this.generateNewPuzzle());
                this.resetBtn.addEventListener('click', () => this.resetBoard());

                this.generateNewPuzzle();
            }

            generateNewPuzzle() {
                this.solution = this.generateSolution();
                const { puzzle, locked } = this.createPuzzle(this.solution);
                this.board = puzzle.map(row => [...row]);
                this.locked = locked.map(row => [...row]);
                this.initialPuzzle = puzzle.map(row => [...row]);
                this.moves = 0;
                this.updateMovesDisplay();
                this.render();
            }

            generateSolution() {
                let solution = Array(this.size).fill(null).map(() => Array(this.size).fill(0));

                // Generate alternating pattern
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        solution[i][j] = (i + j) % 2;
                    }
                }

                // Validate and fix three consecutive violations
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size - 2; j++) {
                        if (solution[i][j] === solution[i][j + 1] && solution[i][j] === solution[i][j + 2]) {
                            solution[i][j + 2] = 1 - solution[i][j + 2];
                        }
                    }
                }

                // Check columns
                for (let j = 0; j < this.size; j++) {
                    for (let i = 0; i < this.size - 2; i++) {
                        if (solution[i][j] === solution[i + 1][j] && solution[i][j] === solution[i + 2][j]) {
                            solution[i + 2][j] = 1 - solution[i + 2][j];
                        }
                    }
                }

                return solution;
            }

            swapIfValid(board, r1, c1, r2, c2) {
                let temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }

            hasThreeConsecutive(board) {
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size - 2; j++) {
                        if (board[i][j] !== -1 && board[i][j] === board[i][j + 1] && board[i][j] === board[i][j + 2]) {
                            return true;
                        }
                    }
                }

                for (let j = 0; j < this.size; j++) {
                    for (let i = 0; i < this.size - 2; i++) {
                        if (board[i][j] !== -1 && board[i][j] === board[i + 1][j] && board[i][j] === board[i + 2][j]) {
                            return true;
                        }
                    }
                }

                return false;
            }

            isValidMove(row, col, value) {
                const temp = this.board[row][col];
                this.board[row][col] = value;
                const valid = !this.hasThreeConsecutive(this.board);
                this.board[row][col] = temp;
                return valid;
            }

            hasThreeConsecutiveAt(row, col) {
                const value = this.board[row][col];
                if (value === -1) return false;

                for (let j = 0; j < this.size - 2; j++) {
                    if (col >= j && col < j + 3) {
                        if (this.board[row][j] !== -1 && this.board[row][j] === this.board[row][j + 1] && this.board[row][j] === this.board[row][j + 2]) {
                            return true;
                        }
                    }
                }

                for (let i = 0; i < this.size - 2; i++) {
                    if (row >= i && row < i + 3) {
                        if (this.board[i][col] !== -1 && this.board[i][col] === this.board[i + 1][col] && this.board[i][col] === this.board[i + 2][col]) {
                            return true;
                        }
                    }
                }

                return false;
            }

            createPuzzle(solution) {
                let puzzle = Array(this.size).fill(null).map(() => Array(this.size).fill(-1));
                let locked = Array(this.size).fill(null).map(() => Array(this.size).fill(false));

                // Reveal about 40% of the cells
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (Math.random() < 0.4) {
                            puzzle[i][j] = solution[i][j];
                            locked[i][j] = true;
                        }
                    }
                }

                return { puzzle, locked };
            }

            resetBoard() {
                this.board = this.initialPuzzle.map(row => [...row]);
                this.moves = 0;
                this.updateMovesDisplay();
                this.render();
            }

            toggleCell(row, col) {
                if (this.locked[row][col]) {
                    return;
                }

                let newValue;
                if (this.board[row][col] === -1) {
                    newValue = 0;
                } else if (this.board[row][col] === 0) {
                    newValue = 1;
                } else {
                    newValue = -1;
                }

                if (!this.isValidMove(row, col, newValue)) {
                    return;
                }

                this.board[row][col] = newValue;
                this.moves++;
                this.updateMovesDisplay();
                this.render();
            }

            updateMovesDisplay() {
                this.movesElement.textContent = this.moves;
            }

            render() {
                this.boardElement.innerHTML = '';

                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';

                        const value = this.board[i][j];
                        if (value === 0) {
                            cell.textContent = '☀️';
                            cell.classList.add('sun');
                        } else if (value === 1) {
                            cell.textContent = '🌙';
                            cell.classList.add('moon');
                        }

                        if (this.locked[i][j]) {
                            cell.classList.add('locked');
                        } else {
                            cell.addEventListener('click', () => this.toggleCell(i, j));
                        }

                        if (this.hasThreeConsecutiveAt(i, j)) {
                            cell.classList.add('invalid');
                        }

                        this.boardElement.appendChild(cell);
                    }
                }
            }
        }

        window.addEventListener('load', () => {
            new TangoGame();
        });
    </script>
</body>
</html>
