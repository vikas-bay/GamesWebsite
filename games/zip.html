<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zip - Puzzle Game</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">Back to Games</a>

        <div class="game-container">
            <div class="game-header">
                <h1>🔤 Zip</h1>
                <div class="game-buttons">
                    <button class="btn btn-primary" id="generateBtn">Generate New Puzzle</button>
                    <button class="btn btn-secondary" id="revealBtn">Reveal Answer</button>
                    <button class="btn btn-secondary" id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="game-info">
                <div class="info-row">
                    <span>Current Word:</span>
                    <strong id="currentWord">-</strong>
                </div>
                <div class="info-row">
                    <span>Moves:</span>
                    <strong id="moves">0</strong>
                </div>
            </div>

            <div class="game-content">
                <div class="game-board">
                    <div style="margin-bottom: 20px; text-align: center;">
                        <div style="font-size: 2rem; font-weight: bold; color: #667eea; margin-bottom: 10px;" id="wordDisplay">???</div>
                        <div style="color: #666; margin-bottom: 15px;" id="hint">Hint: A common word</div>
                    </div>
                    <div class="grid grid-6x6" id="gameBoard"></div>
                </div>
            </div>

            <div style="text-align: center; color: #666; margin-top: 20px;">
                <p>Click letters in sequence to spell the hidden word. Letters must be adjacent or selected in the correct order.</p>
                <button class="btn btn-secondary" id="clearSelectionBtn" style="margin-top: 15px;">Clear Selection</button>
            </div>
        </div>
    </div>

    <script>
        const wordBank = [
            { word: 'PUZZLE', hint: 'A brainteaser' },
            { word: 'GAMES', hint: 'Fun activities' },
            { word: 'WORDS', hint: 'Language units' },
            { word: 'PLAYER', hint: 'One who participates' },
            { word: 'WINNER', hint: 'One who succeeds' },
            { word: 'LETTERS', hint: 'Alphabet characters' },
            { word: 'CIPHER', hint: 'A secret code' },
            { word: 'RIDDLE', hint: 'A mysterious question' },
            { word: 'ANSWER', hint: 'A solution' },
            { word: 'CLEVER', hint: 'Intelligent' },
            { word: 'BRIGHT', hint: 'Full of light' },
            { word: 'MENTAL', hint: 'Related to the mind' }
        ];

        class ZipGame {
            constructor() {
                this.size = 6;
                this.board = [];
                this.selectedIndices = [];
                this.moves = 0;
                this.currentWordData = null;
                this.boardElement = document.getElementById('gameBoard');
                this.movesElement = document.getElementById('moves');
                this.wordDisplayElement = document.getElementById('wordDisplay');
                this.hintElement = document.getElementById('hint');
                this.currentWordElement = document.getElementById('currentWord');
                this.generateBtn = document.getElementById('generateBtn');
                this.revealBtn = document.getElementById('revealBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.clearSelectionBtn = document.getElementById('clearSelectionBtn');

                this.generateBtn.addEventListener('click', () => this.generateNewPuzzle());
                this.revealBtn.addEventListener('click', () => this.revealAnswer());
                this.resetBtn.addEventListener('click', () => this.resetBoard());
                this.clearSelectionBtn.addEventListener('click', () => this.clearSelection());

                this.generateNewPuzzle();
            }

            generateNewPuzzle() {
                this.currentWordData = wordBank[Math.floor(Math.random() * wordBank.length)];
                this.board = this.createBoard();
                this.selectedIndices = [];
                this.moves = 0;
                this.updateDisplay();
                this.render();
            }

            createBoard() {
                const word = this.currentWordData.word;
                const board = Array(this.size * this.size).fill(null);

                // Place word letters at random positions
                const positions = [];
                for (let i = 0; i < this.size * this.size; i++) {
                    positions.push(i);
                }
                positions.sort(() => Math.random() - 0.5);

                for (let i = 0; i < word.length; i++) {
                    board[positions[i]] = word[i];
                }

                // Fill remaining cells with random letters
                const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === null) {
                        board[i] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    }
                }

                return board;
            }

            resetBoard() {
                this.selectedIndices = [];
                this.moves = 0;
                this.updateDisplay();
                this.render();
            }

            clearSelection() {
                this.selectedIndices = [];
                this.updateDisplay();
                this.render();
            }

            revealAnswer() {
                const positions = [];
                for (let i = 0; i < this.board.length; i++) {
                    if (this.board[i] === this.currentWordData.word[positions.length]) {
                        positions.push(i);
                    }
                }

                if (positions.length === 0) {
                    for (let i = 0; i < this.board.length; i++) {
                        for (let j = 0; j < this.currentWordData.word.length; j++) {
                            if (this.board[i] === this.currentWordData.word[j]) {
                                positions.push(i);
                                break;
                            }
                        }
                        if (positions.length === this.currentWordData.word.length) break;
                    }
                }

                this.selectedIndices = positions;
                this.updateDisplay();
                this.render();
            }

            selectCell(index) {
                if (this.selectedIndices.includes(index)) {
                    // Remove from selection if already selected
                    this.selectedIndices = this.selectedIndices.filter(i => i !== index);
                } else {
                    this.selectedIndices.push(index);
                    this.moves++;
                }

                const selectedWord = this.getSelectedWord();
                if (selectedWord === this.currentWordData.word) {
                    setTimeout(() => {
                        alert(`Congratulations! You found "${this.currentWordData.word}" in ${this.moves} moves!`);
                        this.generateNewPuzzle();
                    }, 100);
                }

                this.updateDisplay();
                this.render();
            }

            getSelectedWord() {
                return this.selectedIndices.map(i => this.board[i]).join('');
            }

            updateDisplay() {
                this.movesElement.textContent = this.moves;
                this.hintElement.textContent = `Hint: ${this.currentWordData.hint}`;
                this.currentWordElement.textContent = this.getSelectedWord() || '-';

                const current = this.getSelectedWord();
                const target = this.currentWordData.word;
                if (current.length > 0) {
                    const isValid = target.startsWith(current);
                    this.wordDisplayElement.style.color = isValid ? '#667eea' : '#f44336';
                    this.wordDisplayElement.textContent = current || '???';
                } else {
                    this.wordDisplayElement.textContent = '???';
                    this.wordDisplayElement.style.color = '#667eea';
                }
            }

            render() {
                this.boardElement.innerHTML = '';

                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = this.board[i];

                    if (this.selectedIndices.includes(i)) {
                        cell.classList.add('active');
                    }

                    cell.addEventListener('click', () => this.selectCell(i));
                    this.boardElement.appendChild(cell);
                }
            }
        }

        window.addEventListener('load', () => {
            new ZipGame();
        });
    </script>
</body>
</html>
